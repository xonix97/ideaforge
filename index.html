<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IdeaForge — SaaS Idea Generator</title>
<meta name="description" content="IdeaForge — generate a fresh SaaS startup idea in one click." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#0b0d12; --panel:#141822; --line:rgba(255,255,255,.08);
    --text:#eef1f7; --muted:#8a90a2; --a1:#ff7a59; --a2:#7c5cff; --a3:#22d3ee; --green:#2dd4a7;
    --display:"Sora",system-ui,sans-serif; --body:"Inter",system-ui,sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:var(--body); background:
      radial-gradient(900px 500px at 85% -5%, rgba(124,92,255,.22), transparent),
      radial-gradient(800px 500px at 0% 100%, rgba(34,211,238,.12), transparent), var(--bg);
    color:var(--text); min-height:100vh; }
  .wrap { max-width:860px; margin:0 auto; padding:0 22px; }
  header { padding:26px 0; display:flex; align-items:center; justify-content:space-between; }
  .brand { font-family:var(--display); font-weight:800; font-size:22px; display:flex; align-items:center; gap:10px; }
  .brand .spark { width:30px; height:30px; border-radius:8px; background:linear-gradient(135deg,var(--a1),var(--a2)); display:grid; place-items:center; font-size:16px; box-shadow:0 0 22px rgba(124,92,255,.45); }
  .tab { background:none; border:1px solid var(--line); color:var(--muted); padding:8px 14px; border-radius:999px; cursor:pointer; font-size:14px; }
  .tab:hover { color:var(--text); border-color:var(--a2); }

  .hero { text-align:center; padding:30px 0 16px; }
  .hero h1 { font-family:var(--display); font-size:clamp(32px,5vw,52px); font-weight:800; letter-spacing:-1.5px; line-height:1.05; }
  .hero h1 .g { background:linear-gradient(135deg,var(--a1),var(--a2),var(--a3)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .hero p { color:var(--muted); margin:14px auto 0; max-width:480px; font-size:16px; }

  .stage { background:var(--panel); border:1px solid var(--line); border-radius:22px; padding:34px 30px; margin:26px 0; min-height:230px; display:flex; flex-direction:column; justify-content:center; position:relative; overflow:hidden; }
  .idea-name { font-family:var(--display); font-size:30px; font-weight:700; letter-spacing:-.5px; }
  .idea-tag { color:var(--a3); font-size:15px; margin-top:4px; font-weight:500; }
  .idea-pitch { color:#cfd4e2; font-size:17px; line-height:1.65; margin-top:18px; }
  .idea-pitch b { color:#fff; }
  .meta { display:flex; gap:10px; flex-wrap:wrap; margin-top:20px; }
  .chip { font-size:12px; padding:6px 12px; border-radius:999px; border:1px solid var(--line); color:var(--muted); }
  .chip b { color:var(--text); font-weight:600; }
  .placeholder { text-align:center; color:var(--muted); }

  .actions { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  .btn { font-family:var(--display); font-weight:600; border:none; padding:15px 30px; border-radius:12px; font-size:16px; cursor:pointer; transition:transform .15s, box-shadow .2s; }
  .btn-main { background:linear-gradient(135deg,var(--a1),var(--a2)); color:#fff; }
  .btn-main:hover { transform:translateY(-2px); box-shadow:0 14px 34px rgba(124,92,255,.4); }
  .btn-ghost { background:var(--panel); border:1px solid var(--line); color:var(--text); }
  .btn-ghost:hover { border-color:var(--a2); }

  .saved { margin:40px 0 60px; }
  .saved h3 { font-family:var(--display); font-size:18px; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .saved-item { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; gap:12px; }
  .saved-item .n { font-weight:600; }
  .saved-item .t { color:var(--muted); font-size:13px; }
  .saved-item button { background:none; border:none; color:var(--muted); cursor:pointer; font-size:13px; }
  .empty { color:var(--muted); font-size:14px; }
  footer { text-align:center; color:var(--muted); font-size:13px; padding:24px 0 40px; }
  footer a { color:var(--a3); text-decoration:none; }
  .fade { animation:fade .4s ease; }
  @keyframes fade { from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><span class="spark">⚡</span> IdeaForge</div>
    <button class="tab" onclick="document.getElementById('saved').scrollIntoView({behavior:'smooth'})">★ Saved (<span id="savedCount">0</span>)</button>
  </header>

  <div class="hero">
    <h1>Your next <span class="g">SaaS idea</span>,<br>one click away.</h1>
    <p>Stop staring at a blank Notion doc. Forge a fresh, weirdly-specific startup idea in a tap.</p>
  </div>

  <div class="stage" id="stage">
    <div class="placeholder" id="ph">Hit <b>Forge an idea</b> to begin →</div>
    <div id="idea" style="display:none"></div>
  </div>

  <div class="actions">
    <button class="btn btn-main" onclick="forge()">⚡ Forge an idea</button>
    <button class="btn btn-ghost" onclick="saveCurrent()">★ Save this</button>
  </div>

  <div class="saved" id="saved">
    <h3>★ Saved ideas</h3>
    <div id="savedList"><div class="empty">Nothing saved yet — forge one you like and hit Save.</div></div>
  </div>

  <footer>
    IdeaForge — built by <a href="https://xonix-am14.netlify.app" target="_blank" rel="noopener">xonix</a> ·
    <a href="https://github.com/xonix97" target="_blank" rel="noopener">GitHub</a> ·
    <a href="https://laborx.com/gigs/i-will-build-a-custom-discord-bot-for-your-server-in-48-hours-103949" target="_blank" rel="noopener">Hire me</a>
  </footer>
</div>

<script>
  const audiences = ["indie game devs","Shopify merchants","Discord community owners","freelance designers","crypto traders","podcast hosts","real-estate agents","yoga studios","Notion power-users","Twitch streamers","dropshippers","local restaurants","newsletter writers","DevOps teams","wedding photographers","solo founders","online tutors","fitness coaches","NFT artists","small law firms"];
  const problems = ["spend hours on repetitive busywork","can't tell which content actually converts","lose track of leads in spreadsheets","struggle to price their work","get ghosted by clients","drown in customer DMs","have no idea why users churn","waste money on tools they don't use","can't keep their branding consistent","forget to follow up"];
  const mechanisms = ["AI copilot","no-code dashboard","Chrome extension","Slack bot","automated weekly report","drag-and-drop builder","smart inbox","analytics layer","scheduling engine","one-click template library"];
  const twists = ["priced per-result instead of per-seat","that works fully offline","with a built-in marketplace","that pays you back in credits for referrals","fine-tuned on your own data","that sets itself up in 60 seconds","with a generous free tier and no card","that's open-source at the core","gamified with streaks and leaderboards","that integrates with the 3 tools they already use"];
  const prefixes = ["Loop","Nova","Pulse","Drift","Quill","Forge","Beacon","Vellum","Hatch","Glide","Stack","Tally","Orbit","Ember","Crisp"];
  const suffixes = ["ly","HQ","flow","kit","base","loop","wise","stack","labs","io"];
  const difficulty = ["Weekend build","2-week MVP","1-month build","Ambitious"];
  const pricing = ["$9/mo","$19/mo","$29/mo","$49/mo","usage-based","$15/mo + free tier"];

  const pick = (a) => a[Math.floor(Math.random()*a.length)];
  const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);
  let current = null;

  function makeIdea() {
    const name = pick(prefixes) + pick(suffixes);
    const aud = pick(audiences), prob = pick(problems), mech = pick(mechanisms), twist = pick(twists);
    return {
      name,
      tagline: `${cap(mech)} for ${aud}`,
      pitch: `For <b>${aud}</b> who <b>${prob}</b>, ${name} is a ${mech} that fixes it — ${twist}.`,
      diff: pick(difficulty),
      price: pick(pricing),
    };
  }

  function render(idea) {
    current = idea;
    document.getElementById("ph").style.display = "none";
    const el = document.getElementById("idea");
    el.style.display = "block";
    el.classList.remove("fade"); void el.offsetWidth; el.classList.add("fade");
    el.innerHTML = `
      <div class="idea-name">${idea.name}</div>
      <div class="idea-tag">${idea.tagline}</div>
      <div class="idea-pitch">${idea.pitch}</div>
      <div class="meta">
        <span class="chip">⏱ <b>${idea.diff}</b></span>
        <span class="chip">💵 <b>${idea.price}</b></span>
      </div>`;
  }

  function forge() { render(makeIdea()); }

  let saved = JSON.parse(localStorage.getItem("ideaforge_saved") || "[]");
  function renderSaved() {
    document.getElementById("savedCount").textContent = saved.length;
    const list = document.getElementById("savedList");
    if (!saved.length) { list.innerHTML = '<div class="empty">Nothing saved yet — forge one you like and hit Save.</div>'; return; }
    list.innerHTML = saved.map((s, i) => `
      <div class="saved-item">
        <div><div class="n">${s.name}</div><div class="t">${s.tagline}</div></div>
        <button onclick="removeSaved(${i})">✕ remove</button>
      </div>`).join("");
  }
  function saveCurrent() {
    if (!current) return;
    if (saved.some((s) => s.name === current.name && s.tagline === current.tagline)) return;
    saved.unshift(current);
    localStorage.setItem("ideaforge_saved", JSON.stringify(saved));
    renderSaved();
  }
  function removeSaved(i) { saved.splice(i, 1); localStorage.setItem("ideaforge_saved", JSON.stringify(saved)); renderSaved(); }

  renderSaved();
  forge();
</script>
</body>
</html>
